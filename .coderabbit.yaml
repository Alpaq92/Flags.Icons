# CodeRabbit configuration — https://docs.coderabbit.ai/reference/configuration
#
# Behavior tuned for a solo OSS .NET multi-package repo: auto-review every
# PR (including bot-authored ones from release-please / Dependabot), use the
# low-noise "chill" review profile, comments-only (not blocking), and skip
# files that are either vendored (twemoji submodule) or auto-generated.

language: en-US

reviews:
  profile: chill                       # chill = fewer nits; assertive = more aggressive
  request_changes_workflow: true       # let CodeRabbit submit Approve / Request-changes reviews
                                       # (clean PRs auto-approved; supports @coderabbitai approve / resolve)
  high_level_summary: true             # generate the PR overview comment
  poem: false                          # skip the AI-generated poem
  review_status: true
  collapse_walkthrough: false

  # Don't review these — vendored or generated content adds noise and burns
  # review budget on things humans don't author.
  path_filters:
    - "!twemoji/**"                    # vendored upstream submodule (jdecked/twemoji)
    - "!assets/twemoji/**"             # build-staged ISO-renamed copies of the above
    - "!**/*.g.cs"                     # build-time generated (FlagKind.g.cs etc.)
    - "!**/bin/**"
    - "!**/obj/**"
    - "!nupkg/**"

  auto_review:
    enabled: true
    drafts: false                      # don't auto-review draft PRs
    base_branches:
      - main
    # Review EVERY PR including trusted authors. CodeRabbit's approval satisfies
    # the branch ruleset's "Require approval of most recent reviewable push"
    # rule (it acts under its own bot identity, distinct from the human/PAT
    # that pushed). Owner/bot PRs no longer get auto-approved by a separate
    # workflow — review is real and gating.
    #
    # If CodeRabbit takes too long or nitpicks, the existing admin-bypass on
    # the branch ruleset (mode: always for admin role) lets the owner force
    # the merge via GitHub's "Merge without waiting for requirements" button.
    ignore_usernames: []
