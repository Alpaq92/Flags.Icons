name: Monthly bundled-flag-source bump

# Pulls each upstream flag-icon submodule to its remote default-branch HEAD on
# the 1st of every month, and opens a PR if any of them moved. Merging that PR
# triggers the normal release-please flow → release-please-bot opens a release
# PR → merging that cuts a new tag + publishes the 9 NuGet packages with the
# refreshed flag set.
#
# The PR title uses `feat(deps):` so release-please scores it as a minor bump
# (matching the way bundled-flag refreshes have always shipped) and lists the
# change under the Dependencies section of the generated changelog.
#
# `workflow_dispatch` lets a maintainer force-run this between scheduled fires
# (handy after an upstream pushes a notable flag set mid-month).
#
# Why monthly + not weekly: the upstreams move slowly (a few SVG tweaks per
# quarter at most), the resulting NuGet bumps are user-visible churn, and a
# 12-bumps-a-year cadence keeps consumers fresh without dependabot fatigue.

on:
  schedule:
    - cron: '0 4 1 * *'   # 04:00 UTC on the 1st of every month
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: monthly-submodule-bump
  cancel-in-progress: false

jobs:
  bump:
    name: Pull each submodule to upstream HEAD + open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with submodules at their pinned commits
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          # Pin to main explicitly: without this, workflow_dispatch would
          # checkout whichever ref the maintainer picked from the UI dropdown
          # (the action's default is github.ref), and the bump PR would end
          # up based on the wrong branch.
          ref: main
          submodules: true
          fetch-depth: 0
          # PAT so the eventual push triggers the auto-open-pr workflow and
          # downstream CI / release-please runs on the resulting branch; the
          # default GITHUB_TOKEN doesn't fan out to other workflows.
          token: ${{ secrets.RELEASE_PLEASE_PAT || github.token }}

      - name: Fast-forward every submodule to its upstream default branch
        id: pull
        shell: bash
        run: |
          set -euo pipefail

          # Per-submodule: detach from the pinned commit, fetch the remote's
          # default branch, hard-reset to that ref. We're not preserving any
          # local submodule edits — the gitlink is the only thing this repo
          # tracks for them.
          git submodule foreach --recursive '
            default_branch=$(git remote show origin | awk "/HEAD branch/ {print \$NF}")
            echo "  → $name on $default_branch"
            git fetch --depth=1 origin "$default_branch"
            git checkout "origin/$default_branch"
          '

          # Anything to do? `git diff --cached` after `git add` would also work
          # but porcelain status on the submodule paths reads cleaner in logs.
          if git diff --quiet submodules/; then
            echo "No submodule moved this cycle — nothing to bump."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

          # Build a one-line summary per moved submodule for the commit body.
          # `git submodule summary` returns a multi-line diff per entry; trim
          # to the header line so the commit body stays scannable.
          {
            echo "summary<<__EOF__"
            git submodule summary submodules/ | grep -E '^\* submodules/' || true
            echo "__EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Open PR with bumped submodule pins
        if: steps.pull.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || github.token }}
          BUMP_SUMMARY: ${{ steps.pull.outputs.summary }}
        shell: bash
        run: |
          set -euo pipefail

          stamp=$(date -u +%Y-%m-%d)
          branch="chore/bump-submodules-${stamp}"

          # Identity for the bump commit — surfaces as the PR author so the
          # existing trusted-author auto-open + auto-merge rules pick it up.
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git checkout -B "$branch"
          git add submodules/
          git commit -m "feat(deps): bump bundled flag SVG sources to ${stamp} upstream HEAD

          ${BUMP_SUMMARY}

          Auto-generated by .github/workflows/monthly-submodule-bump.yml.
          Refreshes the gitlinks for the 5 bundled flag-source submodules to
          each upstream's current default-branch HEAD. Build pipeline restages
          the SVGs and re-generates the per-source enums on next dotnet build."
          git push --force-with-lease --set-upstream origin "$branch"

          gh pr create \
            --base main \
            --head "$branch" \
            --title "feat(deps): bump bundled flag SVG sources (${stamp})" \
            --body "$(cat <<EOF
          Monthly upstream refresh from \`.github/workflows/monthly-submodule-bump.yml\`.

          Each of the 5 bundled flag-icon submodules is fast-forwarded to its upstream default-branch HEAD. Merging this PR re-runs the build pipeline against the new SVGs — the per-source enums (\`TwemojiFlag\`, \`CircleFlag\`, \`SquareFlag\`, \`LipisFlag\`, \`FlagHubFlag\`) regenerate automatically.

          ## Submodules moved

          \`\`\`
          ${BUMP_SUMMARY}
          \`\`\`

          ## Downstream

          Once merged, release-please will open a \`chore(main): release X.Y.0\` PR (minor bump from the \`feat(deps):\` prefix). Merging that cuts a new tag and publishes the 9 refreshed NuGet packages.

          🤖 Generated by the monthly-submodule-bump workflow.
          EOF
          )"
