name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  analyze:
    name: Analyze (csharp)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Init CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          languages: csharp
          build-mode: manual
          queries: security-and-quality

      # Scan the cross-platform core + the single-TFM wrappers that build
      # cleanly on Linux without extra workloads. Skipped:
      #   - Flags.Icons.Uno (multi-TFM including net10.0-browserwasm, which
      #     needs the wasm-tools workload — see ci.yml's note)
      #   - Flags.Icons.WPF / .WinForms / .WinUi / .MAUI (Windows-only stacks)
      # All wrappers are thin adapters around the same core, so missing them
      # doesn't materially shrink coverage.
      - name: Build core + Linux-buildable wrappers
        run: |
          dotnet build Flags.Icons/Flags.Icons.csproj                  -c Release --nologo
          dotnet build Flags.Icons.Avalonia/Flags.Icons.Avalonia.csproj -c Release --nologo
          dotnet build Flags.Icons.Eto/Flags.Icons.Eto.csproj          -c Release --nologo
          dotnet build Flags.Icons.MewUI/Flags.Icons.MewUI.csproj      -c Release --nologo

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          category: "/language:csharp"
