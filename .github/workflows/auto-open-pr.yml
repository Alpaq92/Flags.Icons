name: Auto-open PR for trusted-author push

# Closes the "push a branch → still need to click Compare & pull request" gap.
# When the owner or a known bot pushes a non-main branch and no PR exists yet
# for it, this workflow opens one using the head commit's subject + body.
#
# Once the PR is open, the existing automation chain takes over:
#   - auto-merge-trusted.yml   → queues `gh pr merge --auto --squash`
#   - CodeRabbit               → reviews and approves / requests changes
#   - release.yml              → on resulting main push, release-please opens
#                                the version-bump PR and the same chain ships
#                                the nupkgs to NuGet
#
# Net effect: `git push <branch>` is the only manual step in the entire
# release pipeline for owner/bot work (modulo CodeRabbit's eventual approval
# or admin-bypass).
#
# Why an actor allowlist: a leaked PAT for any other user could otherwise
# spam the repo with PRs. Restricting to Alpaq92 + release-please's bot
# (which pushes the version-bump chore branches) is conservative without
# blocking real work.
#
# Why dependabot[bot] is NOT on the allowlist: Dependabot opens its own
# PR as part of its branch push (that's its native contract), so this
# workflow was redundant for it. Worse, Dependabot-triggered workflow
# runs read secrets from a *separate* store (Settings → Secrets →
# Dependabot, walled off from the Actions store as a supply-chain
# defense), so secrets.RELEASE_PLEASE_PAT resolves empty and the
# Require-PAT guard below hard-failed every Dependabot push. Excluding
# Dependabot here is cleaner than mirroring the PAT into a second store.
#
# Why no checkout: the head commit's message is fetched via the GitHub REST
# API, so the workflow needs neither a working tree nor persisted git creds —
# smaller attack surface, faster (skips a ~3s checkout step).

on:
  push:
    branches-ignore: [main]
    tags-ignore: ['**']                  # tag pushes carry tag refs in github.ref_name; this workflow only opens branch→main PRs

permissions:
  pull-requests: write
  contents: read

jobs:
  open-pr:
    name: Open PR if none exists
    # `github.event.deleted == false` skips branch-deletion events. The push
    # trigger fires on deletions too, but `github.sha` reverts to the default
    # branch's HEAD in that case — so the REST-API commit-message lookup and
    # the PR-create call would target the wrong commit.
    if: >
      github.event.deleted == false &&
      contains(fromJson('["Alpaq92", "github-actions[bot]"]'), github.actor)
    runs-on: ubuntu-latest
    steps:
      - name: Require RELEASE_PLEASE_PAT
        env:
          PAT: ${{ secrets.RELEASE_PLEASE_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::RELEASE_PLEASE_PAT secret is required so the opened PR is attributed to a real user (otherwise downstream workflows like auto-merge-trusted.yml — which only allowlists 'Alpaq92' — would silently skip the resulting PR)." >&2
            exit 1
          fi

      - name: Open PR or report existing
        env:
          # PAT-only — no GITHUB_TOKEN fallback. See the require-PAT step above
          # for the silent-failure rationale.
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT }}
          BRANCH: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
        run: |
          existing=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -n "$existing" ]; then
            echo "PR #$existing already open for branch '$BRANCH' — nothing to do."
            exit 0
          fi

          # Read the head commit's message via REST API rather than via
          # `git log` on a checkout. No working tree, no persisted git creds.
          commit_msg=$(gh api "repos/$GITHUB_REPOSITORY/commits/$SHA" --jq '.commit.message')
          subject=$(printf '%s\n' "$commit_msg" | head -n1)
          body=$(printf '%s\n' "$commit_msg" | tail -n +3)
          if [ -z "$body" ]; then
            body="_Auto-opened by .github/workflows/auto-open-pr.yml on push by $ACTOR. Head commit had no body — title is the commit subject._"
          fi

          echo "Opening PR for '$BRANCH' (head subject: $subject)"
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --base main \
            --title "$subject" \
            --body "$body"
