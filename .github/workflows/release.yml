name: Release

# release-please reads Conventional Commits on main (`feat:`, `fix:`, `deps:`,
# `BREAKING CHANGE`) and maintains a "Release PR" that bumps the version in
# .release-please-manifest.json, updates CHANGELOG.md, and lists the entries.
# Every time the Release PR is opened or updated, this workflow also queues it
# for auto-merge via `gh pr merge --auto --squash`, so the PR merges on its own
# once CI + CodeQL are green (no human click required). The merge creates the
# tag and GitHub Release; the publish job then packs every library at the new
# tag and pushes to NuGet.org.
#
# Releases created by GITHUB_TOKEN don't trigger other workflows, so the publish
# job lives in the same workflow as release-please (linked via `needs:`) rather
# than listening on `on: release`.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Manually publish this existing tag (skips release-please)'
        required: true

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Open / merge release PR
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      released: ${{ steps.rp.outputs.releases_created }}
      tag: ${{ steps.rp.outputs.tag_name }}
    steps:
      - id: rp
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          # PAT preferred so the release-PR-merge commit (and the tag push) fire
          # downstream workflows like CI on the bumped main and any tag-listening
          # actions. Also lets release-please create the PR on repos where
          # "Allow GitHub Actions to create and approve pull requests" is off,
          # since the PAT acts as the human user rather than GitHub Actions.
          # Falls back to GITHUB_TOKEN if the secret isn't set.
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}

      # Queue the Release PR for auto-merge so it lands on its own when CI +
      # CodeQL pass. The branch ruleset's bypass actors (admin via PAT, or
      # github-actions[bot] via GITHUB_TOKEN) let the merge fire without a
      # human approval — status checks still gate it. Requires "Allow
      # auto-merge" in Settings → General → Pull Requests.
      #
      # The JSON parse happens in the run-block (not in env:) because GitHub
      # evaluates env: before honoring `if:`; passing the raw `pr` output as
      # PR_JSON and parsing with jq at runtime avoids `fromJson('')` blowing
      # up the workflow when release-please had nothing to release.
      - name: Enable auto-merge on release PR
        if: steps.rp.outputs.pr
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}
          PR_JSON: ${{ steps.rp.outputs.pr }}
        run: |
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          gh pr merge --auto --squash "$PR_NUMBER" --repo "$GITHUB_REPOSITORY"

  publish:
    name: Pack & Publish
    runs-on: windows-latest
    needs: release-please
    if: ${{ always() && (needs.release-please.outputs.released == 'true' || github.event_name == 'workflow_dispatch') }}
    permissions:
      contents: read

    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          TAG="${{ needs.release-please.outputs.tag || inputs.tag }}"
          echo "name=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}
          submodules: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Pack Flags.Icons
        run: dotnet pack Flags.Icons/Flags.Icons.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.Avalonia
        run: dotnet pack Flags.Icons.Avalonia/Flags.Icons.Avalonia.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.WPF
        run: dotnet pack Flags.Icons.WPF/Flags.Icons.WPF.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.MAUI
        run: dotnet pack Flags.Icons.MAUI/Flags.Icons.MAUI.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.Uno
        run: dotnet pack Flags.Icons.Uno/Flags.Icons.Uno.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.WinUi
        run: dotnet pack Flags.Icons.WinUi/Flags.Icons.WinUi.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.MewUI
        run: dotnet pack Flags.Icons.MewUI/Flags.Icons.MewUI.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.Eto
        run: dotnet pack Flags.Icons.Eto/Flags.Icons.Eto.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Pack Flags.Icons.WinForms
        run: dotnet pack Flags.Icons.WinForms/Flags.Icons.WinForms.csproj --configuration Release -p:Version=${{ steps.tag.outputs.version }} -p:PackageVersion=${{ steps.tag.outputs.version }} -o ./nupkg

      - name: Push to NuGet.org
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          $packDir = Join-Path $env:GITHUB_WORKSPACE 'nupkg'
          if (-not (Test-Path $packDir)) {
            Write-Error "Pack output directory missing: $packDir"
            exit 1
          }

          $files = @(Get-ChildItem -Path $packDir -Filter '*.nupkg' -File)
          if ($files.Count -eq 0) {
            Write-Host "::group::Contents of $packDir (empty of .nupkg)"
            Get-ChildItem $packDir -Recurse | Format-Table FullName,Length,LastWriteTime
            Write-Host "::endgroup::"
            Write-Error "No .nupkg files in $packDir — pack steps didn't produce output. Check the pack-step logs above."
            exit 1
          }

          Write-Host "Pushing $($files.Count) packages to NuGet.org:"
          $files | ForEach-Object { Write-Host "  - $($_.Name)" }
          foreach ($f in $files) {
            dotnet nuget push $f.FullName --api-key $env:NUGET_API_KEY --source https://api.nuget.org/v3/index.json --skip-duplicate
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Push failed for $($f.Name) with exit code $LASTEXITCODE"
              exit $LASTEXITCODE
            }
          }
