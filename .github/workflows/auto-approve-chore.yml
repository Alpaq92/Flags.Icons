name: Auto-approve trusted chore PRs

# Satisfies the branch ruleset's "Require approval of most recent reviewable push"
# rule for chore() PRs (release-please's "chore(main): release X.Y.Z", repo-settings
# tweaks, etc.) without needing a human second-pair-of-eyes — solo repo, the rule
# exists for collaborator PRs but blocks the bot/owner-driven release pipeline.
#
# The approval is posted under the github-actions[bot] identity, which is a
# distinct actor from the human/PAT that pushed the most recent commit, so it
# satisfies "approval from someone other than the last pusher". Requires the
# repo setting "Allow GitHub Actions to create and approve pull requests" to be
# on (already codified in repo-settings.yml).
#
# Why not just disable the rule: it stays useful for any external-contributor
# PRs that happen to be titled "chore" — we still require approval, just from
# this trusted-author allowlist. External chore-titled PRs from other authors
# fall through the if-filter and need a human review.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  approve:
    name: Auto-approve chore PR from trusted author
    if: >
      !github.event.pull_request.draft &&
      startsWith(github.event.pull_request.title, 'chore') &&
      contains(fromJson('["Alpaq92", "github-actions[bot]"]'), github.event.pull_request.user.login)
    runs-on: ubuntu-latest
    steps:
      - name: gh pr review --approve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          echo "Approving PR #$PR_NUMBER (chore PR by $AUTHOR)"
          gh pr review "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --approve \
            --body "Auto-approved by .github/workflows/auto-approve-chore.yml — chore PR from trusted author, no human review required."
