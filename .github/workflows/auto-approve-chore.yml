name: Auto-approve trusted-author PRs

# Satisfies the branch ruleset's "Require approval of most recent reviewable push"
# rule for any PR opened (or pushed to) by the owner or a known bot. The rule
# is useful for external-contributor PRs but blocks every owner/bot push on this
# solo repo, since the last pusher can't approve their own work.
#
# The approval is posted under the github-actions[bot] identity, which is a
# distinct actor from the human/PAT that pushed the most recent commit, so it
# satisfies "approval from someone other than the last pusher". Requires the
# repo setting "Allow GitHub Actions to create and approve pull requests" to be
# on (already codified in repo-settings.yml).
#
# No commit-type filter — owner/bot work is trusted regardless of `feat:` /
# `fix:` / `chore:` / `ci:` / etc. External-contributor PRs (anyone outside
# the actor allowlist below) fall through and still need a human review.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  approve:
    name: Auto-approve PR from trusted author
    if: >
      !github.event.pull_request.draft &&
      contains(fromJson('["Alpaq92", "github-actions[bot]", "dependabot[bot]"]'), github.event.pull_request.user.login)
    runs-on: ubuntu-latest
    steps:
      - name: gh pr review --approve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Approving PR #$PR_NUMBER ($TITLE) by $AUTHOR"
          gh pr review "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --approve \
            --body "Auto-approved by .github/workflows/auto-approve-chore.yml — PR from trusted author, no human review required."
