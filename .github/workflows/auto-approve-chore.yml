name: Auto-approve trusted non-feature PRs

# Satisfies the branch ruleset's "Require approval of most recent reviewable push"
# rule for non-feature PRs from trusted authors (release-please's release PRs,
# Dependabot bumps, owner-driven ops / docs / refactors) without needing a human
# second-pair-of-eyes — solo repo, the rule exists for external-contributor PRs
# but otherwise blocks every bot/owner-driven merge.
#
# The approval is posted under the github-actions[bot] identity, which is a
# distinct actor from the human/PAT that pushed the most recent commit, so it
# satisfies "approval from someone other than the last pusher". Requires the
# repo setting "Allow GitHub Actions to create and approve pull requests" to be
# on (already codified in repo-settings.yml).
#
# Allowlisted commit-type prefixes: chore, ci, docs, refactor. Intentionally
# excludes feat, fix, perf — those carry behavior changes and still get human
# eyes (or a CodeRabbit review for external contributors).
#
# Why not just disable the ruleset rule: it stays useful for any external
# contributor's PR matching these prefixes — we still require approval there,
# just from this trusted-author allowlist. Non-allowlisted authors fall through
# the if-filter and need a human review.

on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  approve:
    name: Auto-approve non-feature PR from trusted author
    if: >
      !github.event.pull_request.draft &&
      (startsWith(github.event.pull_request.title, 'chore') ||
       startsWith(github.event.pull_request.title, 'ci') ||
       startsWith(github.event.pull_request.title, 'docs') ||
       startsWith(github.event.pull_request.title, 'refactor')) &&
      contains(fromJson('["Alpaq92", "github-actions[bot]"]'), github.event.pull_request.user.login)
    runs-on: ubuntu-latest
    steps:
      - name: gh pr review --approve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          AUTHOR: ${{ github.event.pull_request.user.login }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Approving PR #$PR_NUMBER ($TITLE) by $AUTHOR"
          gh pr review "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --approve \
            --body "Auto-approved by .github/workflows/auto-approve-chore.yml — non-feature PR from trusted author, no human review required."
