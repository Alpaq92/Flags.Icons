name: Refresh FlagKit

on:
  schedule:
    - cron: '0 3 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Pull upstream FlagKit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          # PAT (with `repo` scope) is required so the resulting push triggers
          # release.yml — GITHUB_TOKEN pushes don't fire downstream workflows.
          # Falls back to GITHUB_TOKEN if the PAT secret isn't set (the commit
          # still lands, but release-please won't run until the next manual push).
          token: ${{ secrets.RELEASE_PLEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Refresh FlagKit submodule
        shell: bash
        run: |
          git submodule update --remote --merge FlagKit
          if git diff --quiet -- FlagKit; then
            echo "FlagKit submodule already at latest upstream"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FlagKit
          git commit -m "feat: refresh FlagKit submodule to upstream tip"
          git push origin HEAD:main
